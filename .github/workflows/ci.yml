name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  zig:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: x86_64-linux,  os: ubuntu-latest,    triples: x86_64-linux-none x86_64-linux-gnu x86_64-linux-musl }
          - { id: aarch64-linux, os: ubuntu-24.04-arm, triples: aarch64-linux-none aarch64-linux-gnu aarch64-linux-musl }
          - { id: macos,         os: macos-14,         triples: aarch64-macos }
          - { id: windows,       os: windows-latest,   triples: x86_64-windows-gnu }
          - { id: wasm,          os: ubuntu-latest,    triples: wasm32-wasi wasm32-freestanding }
    name: ${{ matrix.id }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: master
      - if: runner.os == 'Windows'
        run: choco install make --no-progress
      - if: contains(matrix.triples, 'wasm32')
        uses: bytecodealliance/actions/wasmtime/setup@v1
      - shell: bash
        run: |
          for triple in ${{ matrix.triples }}; do
            make ci TRIPLE=$triple
          done

  gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make ci CC=gcc

  msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - run: msbuild tools\windows\sp\sp.sln /p:Configuration=Release /p:Platform=x64 /m
      - shell: bash
        run: |
          for t in tools/windows/sp/build/vs/Release/bin/*.exe; do
            echo "=== $t ==="
            "$t" || exit 1
          done

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [zig, gcc, msvc]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - run: |
          tag=${GITHUB_REF_NAME}
          mkdir -p release "$tag/sp"
          cp sp.h LICENSE "$tag/"
          cp sp/*.h "$tag/sp/"
          tar -czf "release/sp-$tag.tar.gz" "$tag"
          cp sp.h release/sp.h
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/sp.h
            release/sp-*.tar.gz
          generate_release_notes: true
